```
<input id="username" type="text" placeholder="请输入用户名">
<input id="password" type="password" placeholder="请输入密码">

<button id="login-btn" onclick="login()">立即登录</button>

<div id="error-msg" class="error"></div>

<div class="footer">
    没有账号？<a href="register.html">去注册</a>
</div>
```

</div>

<script>
const BASE_URL = "http://127.0.0.1:8000";

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn = document.getElementById("login-btn");
    const errorMsg = document.getElementById("error-msg");

    errorMsg.innerText = "";

    if (!username || !password) {
        errorMsg.innerText = "请输入用户名和密码";
        return;
    }

    btn.innerText = "登录中...";
    btn.disabled = true;

    try {
        const response = await fetch(`${BASE_URL}/api/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (data.code !== 200) {
            errorMsg.innerText = data.msg || "登录失败";
            return;
        }

        // 保存token
        localStorage.setItem("token", data.token);

        // 跳转
        window.location.href = "dashboard.html";

    } catch (error) {
        errorMsg.innerText = "网络错误，请检查后端是否启动";
    } finally {
        btn.innerText = "立即登录";
        btn.disabled = false;
    }
}

function showHelp() {
    alert("登录后可以填写你的成绩信息，系统会帮你匹配院校并给出升学建议。");
}
</script>

</body>
